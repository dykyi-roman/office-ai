<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OfficeAI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header__logo">
      <img src="../icons/icon-48.png" alt="OfficeAI" class="header__icon" width="20" height="20" />
      <span class="header__title">OfficeAI</span>
    </div>

    <div class="header__status">
      <span class="status-dot" id="status-dot" aria-label="Connection status"></span>
      <span class="status-label" id="status-label">Connecting...</span>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Agent list section -->
    <section class="section" aria-labelledby="agents-heading">
      <div class="section__header">
        <h2 class="section__title" id="agents-heading">Monitored Agents</h2>
        <span class="agent-count" id="agent-count" aria-live="polite">0</span>
      </div>

      <!-- Agent list -->
      <ul class="agent-list" id="agent-list" aria-label="Active AI agents" role="list">
        <!-- Populated by popup.js -->
      </ul>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" aria-live="polite">
        <svg class="empty-state__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <p class="empty-state__text">No AI agents detected.</p>
        <p class="empty-state__hint">Open ChatGPT, Gemini, or Claude in a tab.</p>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <button class="btn btn--reconnect" id="reconnect-btn" type="button" aria-label="Reconnect to Tauri app">
      <svg class="btn__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M23 4v6h-6"/>
        <path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Reconnect
    </button>

    <span class="footer__version">v0.1.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
